# -------------------------------------------------------------------
# CUPS Daemon Configuration File
# -------------------------------------------------------------------

# LogLevel warn
#   Sets the logging level to 'warn' (only warnings and errors are logged).
#   RECOMMENDATION: Use 'info' during troubleshooting, otherwise 'warn' is fine.
LogLevel warn

# PageLogFormat
#   (Empty) – disables page logging.
#   RECOMMENDATION: If you need to track page counts, set a custom format,
#   e.g., PageLogFormat "%p %j %u %{job-billing}" and ensure logs are rotated.
PageLogFormat

# MaxLogSize 0
#   0 disables log rotation based on size.
#   RECOMMENDATION: Set a size limit (e.g., 2m) and enable rotation to avoid
#   disk space exhaustion. Use a tool like logrotate for better control.
MaxLogSize 0

# ErrorPolicy retry-job
#   If a job fails, retry it.
#   RECOMMENDATION: Consider 'stop-printer' for critical environments to
#   avoid endless retries on persistent errors.
ErrorPolicy retry-job

# -------------------------------------------------------------------
# Networking and Sockets
# -------------------------------------------------------------------

# HTTP only (no HTTPS)
Port 631
# Unix domain socket for local communication
Listen /run/cups/cups.sock

# Disable encryption – NOT recommended for production
#   RECOMMENDATION: Remove this line or set "DefaultEncryption Required"
#   to enforce encryption, especially if the CUPS web interface is exposed.
DefaultEncryption Never

# -------------------------------------------------------------------
# Browsing / Sharing
# -------------------------------------------------------------------

# Share local printers on the local network
Browsing On
BrowseLocalProtocols dnssd

# Default authentication type for web interface
DefaultAuthType Basic

# Enable the web interface (CUPS admin page)
WebInterface Yes

# Idle timeout: exit after 60 seconds of inactivity (useful for on-demand daemons)
IdleExitTimeout 60

# -------------------------------------------------------------------
# Access Control – Main Location
# -------------------------------------------------------------------

# Allow all access to the main CUPS root.
#   RECOMMENDATION: Restrict to local network or specific IPs if possible.
<Location />
  Order allow,deny
  Allow all
</Location>

# -------------------------------------------------------------------
# Access Control – /admin (Admin Interface)
# -------------------------------------------------------------------

# Basic authentication required for admin pages
<Location /admin>
  AuthType Basic
  Require valid-user
  Order allow,deny
  Allow all
</Location>

# -------------------------------------------------------------------
# Access Control – /admin/conf (Configuration Files)
# -------------------------------------------------------------------

# Allow SYSTEM users (typically root or lpadmin) to access config
#   RECOMMENDATION: Restrict this further if remote access is not needed.
<Location /admin/conf>
  AuthType Default
  Require user @SYSTEM
  Order allow,deny
  Allow all
</Location>

# -------------------------------------------------------------------
# Access Control – /admin/log (Log Files)
# -------------------------------------------------------------------

# Allow SYSTEM users to access logs
<Location /admin/log>
  AuthType Default
  Require user @SYSTEM
  Order allow,deny
  Allow all
</Location>

# -------------------------------------------------------------------
# Policy: default
#   Used for unauthenticated access.
# -------------------------------------------------------------------

<Policy default>
  JobPrivateAccess default
  JobPrivateValues default
  SubscriptionPrivateAccess default
  SubscriptionPrivateValues default

  # All users can create/print jobs
  <Limit Create-Job Print-Job Print-URI Validate-Job>
    Order deny,allow
  </Limit>

  # Job management requires owner or SYSTEM
  <Limit Send-Document Send-URI Hold-Job Release-Job Restart-Job Purge-Jobs Set-Job-Attributes Create-Job-Subscription Renew-Subscription Cancel-Subscription Get-Notifications Reprocess-Job Cancel-Current-Job Suspend-Current-Job Resume-Job Cancel-My-Jobs Close-Job CUPS-Move-Job>
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  # Document retrieval requires authentication
  <Limit CUPS-Get-Document>
    AuthType Default
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  # Printer administration requires SYSTEM
  <Limit CUPS-Add-Modify-Printer CUPS-Delete-Printer CUPS-Add-Modify-Class CUPS-Delete-Class CUPS-Set-Default CUPS-Get-Devices>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  # Printer state changes require SYSTEM
  <Limit Pause-Printer Resume-Printer Enable-Printer Disable-Printer Pause-Printer-After-Current-Job Hold-New-Jobs Release-Held-New-Jobs Deactivate-Printer Activate-Printer Restart-Printer Shutdown-Printer Startup-Printer Promote-Job Schedule-Job-After Cancel-Jobs CUPS-Accept-Jobs CUPS-Reject-Jobs>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  # Cancel job requires owner or SYSTEM
  <Limit Cancel-Job CUPS-Authenticate-Job>
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  # Default deny for all other operations
  <Limit All>
    Order deny,allow
  </Limit>
</Policy>

# -------------------------------------------------------------------
# Policy: authenticated
#   Requires authentication for most operations (but allows anonymous print).
#   RECOMMENDATION: Use this if you want to enforce user authentication.
# -------------------------------------------------------------------

<Policy authenticated>
  JobPrivateAccess default
  JobPrivateValues default
  SubscriptionPrivateAccess default
  SubscriptionPrivateValues default

  # Printing jobs still allowed with default auth
  <Limit Create-Job Print-Job Print-URI Validate-Job>
    AuthType Default
    Order deny,allow
  </Limit>

  # Job management requires authentication
  <Limit Send-Document Send-URI Hold-Job Release-Job Restart-Job Purge-Jobs Set-Job-Attributes Create-Job-Subscription Renew-Subscription Cancel-Subscription Get-Notifications Reprocess-Job Cancel-Current-Job Suspend-Current-Job Resume-Job Cancel-My-Jobs Close-Job CUPS-Move-Job CUPS-Get-Document>
    AuthType Default
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  # Printer administration requires SYSTEM
  <Limit CUPS-Add-Modify-Printer CUPS-Delete-Printer CUPS-Add-Modify-Class CUPS-Delete-Class CUPS-Set-Default>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  # Printer control requires SYSTEM
  <Limit Pause-Printer Resume-Printer Enable-Printer Disable-Printer Pause-Printer-After-Current-Job Hold-New-Jobs Release-Held-New-Jobs Deactivate-Printer Activate-Printer Restart-Printer Shutdown-Printer Startup-Printer Promote-Job Schedule-Job-After Cancel-Jobs CUPS-Accept-Jobs CUPS-Reject-Jobs>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  <Limit Cancel-Job CUPS-Authenticate-Job>
    AuthType Default
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  <Limit All>
    Order deny,allow
  </Limit>
</Policy>

# -------------------------------------------------------------------
# Policy: kerberos
#   Uses Kerberos (Negotiate) for authentication.
#   RECOMMENDATION: Use only if your environment is Kerberos-enabled.
# -------------------------------------------------------------------

<Policy kerberos>
  JobPrivateAccess default
  JobPrivateValues default
  SubscriptionPrivateAccess default
  SubscriptionPrivateValues default

  <Limit Create-Job Print-Job Print-URI Validate-Job>
    AuthType Negotiate
    Order deny,allow
  </Limit>

  <Limit Send-Document Send-URI Hold-Job Release-Job Restart-Job Purge-Jobs Set-Job-Attributes Create-Job-Subscription Renew-Subscription Cancel-Subscription Get-Notifications Reprocess-Job Cancel-Current-Job Suspend-Current-Job Resume-Job Cancel-My-Jobs Close-Job CUPS-Move-Job CUPS-Get-Document>
    AuthType Negotiate
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  <Limit CUPS-Add-Modify-Printer CUPS-Delete-Printer CUPS-Add-Modify-Class CUPS-Delete-Class CUPS-Set-Default>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  <Limit Pause-Printer Resume-Printer Enable-Printer Disable-Printer Pause-Printer-After-Current-Job Hold-New-Jobs Release-Held-New-Jobs Deactivate-Printer Activate-Printer Restart-Printer Shutdown-Printer Startup-Printer Promote-Job Schedule-Job-After Cancel-Jobs CUPS-Accept-Jobs CUPS-Reject-Jobs>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  <Limit Cancel-Job CUPS-Authenticate-Job>
    AuthType Negotiate
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  <Limit All>
    Order deny,allow
  </Limit>
</Policy>

# -------------------------------------------------------------------
# Server Alias
# -------------------------------------------------------------------

# Accept requests for any hostname
ServerAlias *